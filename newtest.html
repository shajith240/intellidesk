<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Premium Cube Core</title>

<style>
body{
margin:0;
background:#050505;
overflow:hidden;
}

#canvas{
width:100%;
height:100vh;
display:block;
}
</style>

</head>

<body>

<canvas id="canvas"></canvas>

<script type="importmap">
{
"imports":{
"three":"https://unpkg.com/three@0.160.0/build/three.module.js",
"three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"
}
}
</script>

<script type="module">

import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { RoundedBoxGeometry } from "three/addons/geometries/RoundedBoxGeometry.js";
import { RoomEnvironment } from "three/addons/environments/RoomEnvironment.js";

const canvas = document.getElementById("canvas");

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
40,
window.innerWidth/window.innerHeight,
0.1,
100
);

camera.position.set(3,2,6);

const renderer = new THREE.WebGLRenderer({
canvas:canvas,
antialias:true
});

renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));

renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(),0.04).texture;

// cube group
const cubeGroup = new THREE.Group();
scene.add(cubeGroup);

// cube geometry
const geometry = new RoundedBoxGeometry(
1,
1,
1,
4,
0.08
);

// premium black metal material
const material = new THREE.MeshPhysicalMaterial({

color:0x0a0a0a,

metalness:0.9,
roughness:0.35,

clearcoat:0.9,
clearcoatRoughness:0.05,

envMapIntensity:2.2

});

const cubes=[];

for(let x=-1;x<=1;x++){
for(let y=-1;y<=1;y++){
for(let z=-1;z<=1;z++){

if(x===0 && y===0 && z===0) continue;

const cube = new THREE.Mesh(geometry,material);

cube.position.set(x*1.05,y*1.05,z*1.05);

cubeGroup.add(cube);
cubes.push(cube);

}}}

// glowing core
const coreGroup = new THREE.Group();
scene.add(coreGroup);

const coreGeo = new THREE.SphereGeometry(0.55,64,64);

const coreMat = new THREE.MeshStandardMaterial({

color:0x1738ff,
emissive:0x1738ff,
emissiveIntensity:2,
roughness:0.3,
metalness:0

});

const core = new THREE.Mesh(coreGeo,coreMat);
coreGroup.add(core);

// glow shell
const glowGeo = new THREE.SphereGeometry(0.8,64,64);

const glowMat = new THREE.MeshStandardMaterial({

color:0x1738ff,
emissive:0x1738ff,
emissiveIntensity:1,
transparent:true,
opacity:0.25,
depthWrite:false

});

const glow = new THREE.Mesh(glowGeo,glowMat);
coreGroup.add(glow);

// aura
const auraGeo = new THREE.SphereGeometry(1.2,64,64);

const auraMat = new THREE.MeshStandardMaterial({

color:0x1738ff,
emissive:0x1738ff,
emissiveIntensity:0.4,
transparent:true,
opacity:0.08,
depthWrite:false

});

const aura = new THREE.Mesh(auraGeo,auraMat);
coreGroup.add(aura);

// core light
const coreLight = new THREE.PointLight(0x1738ff,18,6,2);
coreGroup.add(coreLight);

// studio lighting
const light1 = new THREE.DirectionalLight(0xffffff,3);
light1.position.set(5,5,5);
scene.add(light1);

const light2 = new THREE.DirectionalLight(0xffffff,2);
light2.position.set(-4,3,2);
scene.add(light2);

const light3 = new THREE.DirectionalLight(0xffffff,1.5);
light3.position.set(0,-5,5);
scene.add(light3);

const ambient = new THREE.AmbientLight(0xffffff,0.25);
scene.add(ambient);

// controls
const controls = new OrbitControls(camera,renderer.domElement);
controls.enableZoom=false;
controls.enablePan=false;
controls.autoRotate=true;
controls.autoRotateSpeed=0.4;

// animation
const clock = new THREE.Clock();

function animate(){

requestAnimationFrame(animate);

const t = clock.getElapsedTime();

// cube rotation
cubeGroup.rotation.y = t*0.25;
cubeGroup.rotation.x = Math.sin(t*0.3)*0.15;

// core breathing
const pulse = Math.sin(t*1.5);

core.scale.setScalar(1 + pulse*0.04);
glow.scale.setScalar(1 + pulse*0.08);
aura.scale.setScalar(1 + pulse*0.12);

coreMat.emissiveIntensity = 2 + pulse*0.4;

controls.update();

renderer.render(scene,camera);

}

animate();

window.addEventListener("resize",()=>{

camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</body>
</html>
